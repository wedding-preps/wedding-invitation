      <g fill="#b98a44">
        <circle cx="-15" cy="-5" r="1.8"/><circle cx="-7" cy="-17" r="1.8"/>
        <circle cx="7" cy="-17" r="1.8"/><circle cx="16" cy="-5" r="1.8"/>
        <circle cx="10" cy="10" r="1.8"/><circle cx="-7" cy="12" r="1.8"/>
        <circle cy="-2" r="2"/>
