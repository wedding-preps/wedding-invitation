    </g>

    <g id="hydrangea">
      <g fill="#f7f0e5" stroke="#ccb99f" stroke-width=".45">
        <circle cx="-15" cy="-5" r="10"/>
        <circle cx="-7" cy="-17" r="10"/>
        <circle cx="7" cy="-17" r="10"/>
        <circle cx="16" cy="-5" r="10"/>
        <circle cx="10" cy="10" r="10"/>
        <circle cx="-7" cy="12" r="10"/>
        <circle cx="0" cy="-2" r="11"/>
