<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 932" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="paper-lines" width="12" height="9" patternUnits="userSpaceOnUse">
      <path d="M0 2.5H12M0 7H12" stroke="#fbf8f2" stroke-width=".45" opacity=".08"/>
    </pattern>

    <g id="leaf">
      <path d="M0 0C7-13 17-14 25-7C19 2 10 6 0 0Z" fill="#d6c3ac"/>
      <path d="M2-1C9-5 15-7 22-7" fill="none" stroke="#7a5c42" stroke-width="1"/>
    </g>

    <g id="leaf-dark">
      <path d="M0 0C6-12 16-14 23-8C18 1 9 5 0 0Z" fill="#8e745d"/>
      <path d="M2-1C8-5 14-7 20-7" fill="none" stroke="#5c4433" stroke-width=".9"/>
    </g>

    <g id="daisy">
      <g fill="#fbf8f2" stroke="#d8c7ad" stroke-width=".6">
        <ellipse ry="14" rx="6" transform="rotate(0) translate(0 -12)"/>
        <ellipse ry="14" rx="6" transform="rotate(45) translate(0 -12)"/>
        <ellipse ry="14" rx="6" transform="rotate(90) translate(0 -12)"/>
        <ellipse ry="14" rx="6" transform="rotate(135) translate(0 -12)"/>
      </g>
      <circle r="7.5" fill="#c79a50"/>
      <circle r="3" fill="#8e623a"/>
    </g>

    <g id="blossom">
      <g fill="#eadfc8" stroke="#cdb797" stroke-width=".55">
        <circle cx="0" cy="-7" r="8"/>
        <circle cx="6.7" cy="-2.2" r="8"/>
        <circle cx="4.1" cy="5.8" r="8"/>
        <circle cx="-4.1" cy="5.8" r="8"/>
        <circle cx="-6.7" cy="-2.2" r="8"/>
      </g>
      <circle r="5" fill="#b98a44"/>
    </g>

    <g id="blush-flower">
      <g fill="#d6a48b" stroke="#b98166" stroke-width=".6">
        <ellipse cx="0" cy="-9" rx="8" ry="11"/>
        <ellipse cx="8.6" cy="-2.5" rx="8" ry="11" transform="rotate(72 8.6 -2.5)"/>
        <ellipse cx="5.2" cy="7.5" rx="8" ry="11" transform="rotate(144 5.2 7.5)"/>
        <ellipse cx="-5.2" cy="7.5" rx="8" ry="11" transform="rotate(216 -5.2 7.5)"/>
